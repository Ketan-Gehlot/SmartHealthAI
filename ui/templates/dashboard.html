<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | SmartHealthAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>Prediction Dashboard</h1>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/predict">Predict</a>
    <a href="/dashboard">Dashboard</a>
</nav>

<section class="container">
    <table>
        <tr>
            <th>Disease</th>
            <th>Result</th>
            <th>Confidence</th>
            <th>Time</th>
        </tr>
        {% for row in records %}
        <tr>
            <td>{{ row['disease'] }}</td>
            <td>{{ row['result'] }}</td>
            <td>{{ row['confidence'] }}%</td>
            <td>{{ row['created_at'] }}</td>
        </tr>
        {% endfor %}
    </table>
</section>

</body>
</html>
